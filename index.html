<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SYLENT JIR — AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="toastContainer" aria-live="polite"></div>

  <!-- decorative floating shapes -->
  <div class="deco deco-star" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0l2.6 8.2L23 11l-8.4 2.8L12 22l-2.6-8.2L1 11l8.4-2.8z"/></svg>
  </div>
  <div class="deco deco-circle" aria-hidden="true"></div>
  <div class="deco deco-blob" aria-hidden="true"></div>

  <header>
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 5.6L20 9l-5.6 2.4L12 17l-2.4-5.6L4 9l5.6-1.4z"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">SYLENT AI <span class="status-dot" title="Online"></span></div>
        <div class="brand-sub">AI Assistant &middot; Online</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" title="Dark Mode" aria-label="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
      <button class="icon-btn" id="clearChatBtn" title="Clear Chat" aria-label="Clear chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
      </button>
    </div>
  </header>

  <main id="chatMain">
    <div class="chat-inner" id="chatInner">
      <div class="empty-state" id="emptyState">
        <div class="empty-badge" Gueh Ciap membantu</div>
        <h2>Mulai percakapan</h2>
        <p>Tanya apa saja &mdash; SYLENT mengingat konteks obrolan lu dan bisa menampilkan <strong>preview</strong> langsung klo jawabannya berupa kode, jirr ajaib.</p>
      </div>
    </div>
  </main>

  <div class="input-wrap">
    <div class="input-inner">
      <div class="textarea-shell">
        <textarea id="chatInput" rows="1" placeholder="Tulis pesan... (Enter = baris baru)"></textarea>
      </div>
      <button id="sendBtn" aria-label="Kirim pesan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
